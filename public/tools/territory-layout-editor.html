<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영토 레이아웃 — Sentence Craft</title>
  <style>
    :root { --bg: #0b1020; --text: #e8eefc; --muted: #94a3b8; --accent: #38bdf8; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 1rem 1rem 2rem; font-family: system-ui, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); line-height: 1.55; }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { margin: 0.35rem 0; color: var(--muted); font-size: 0.88rem; }
    code { font-size: 0.82em; background: rgba(0,0,0,0.35); padding: 0.1em 0.35em; border-radius: 4px; }
    a { color: var(--accent); font-weight: 600; }
    #preview-wrap { max-width: min(96rem, calc(100vw - 2rem)); margin: 1rem auto; padding: 0 1rem; }
    @media (min-width: 960px) {
      #preview-wrap { max-width: min(108rem, calc(100vw - 1.5rem)); padding: 0 0.75rem; }
    }
    #frame {
      position: relative; width: 100%; border-radius: 14px; border: 1px solid rgba(255,255,255,0.12);
      min-height: min(72vh, 32rem);
      overflow: hidden;
      background-color: #0b1628;
      background-position: center center;
      background-size: contain;
      background-repeat: no-repeat;
      background-image: none;
    }
    #frame.show-bg { background-image: url("/assets/territory-zones-unified.png"); }
    @media (min-width: 640px) { #frame { min-height: min(78vh, 44rem); } }
    @media (min-width: 960px) { #frame { min-height: min(84vh, 58rem); } }
    .row { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin: 0.75rem 0; }
    input[type="checkbox"] { width: 1rem; height: 1rem; accent-color: #38bdf8; cursor: pointer; }
  </style>
</head>
<body>
  <h1>영토 레이아웃</h1>
  <p>
    영토 화면은 <strong>한 장의 PNG</strong>(<code>public/assets/territory-zones-unified.png</code>)만 쓰고,
    <strong>진보 · 중앙광장 · 보수 · 외계행성</strong> 구역은 전부
    <a href="/tools/territory-hit-zone-editor.html">히트 경계 편집기</a>에서 <code>territory-hit-zones.json</code> 폴리곤으로 나눕니다.
  </p>
  <p><code>territory-layout.json</code> 의 레이어 박스는 더 이상 쓰지 않습니다(빈 <code>layers</code> 유지).</p>
  <p><a href="/">← 메인</a> · <a href="/tools/index.html">편집 도구 목록</a></p>

  <div class="row">
    <label style="display: flex; align-items: center; gap: 0.45rem; cursor: pointer; margin: 0; color: var(--text); font-size: 0.88rem">
      <input type="checkbox" id="chkBg" />
      <span>배경 일러스트 미리보기</span>
    </label>
  </div>
  <div id="preview-wrap">
    <div id="frame" aria-label="영토 단일 이미지 미리보기"></div>
  </div>

  <script>
(function () {
  var frame = document.getElementById('frame');
  var chk = document.getElementById('chkBg');
  var LS = 'scTerritoryEditorShowIslandBg';
  function sync() {
    if (!frame || !chk) return;
    frame.classList.toggle('show-bg', chk.checked);
    try { localStorage.setItem(LS, chk.checked ? '1' : '0'); } catch (_) {}
  }
  if (chk && frame) {
    try {
      var v = localStorage.getItem(LS);
      chk.checked = v !== '0';
    } catch (_) {
      chk.checked = true;
    }
    chk.addEventListener('change', sync);
    sync();
  }
})();
  </script>
</body>
</html>
